<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> Another Month with You!!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --accent-pink: #ff4d6d;
      --accent-gold: #f59e0b;
      --accent-purple: #a855f7;
      --text-primary: #f8fafc;
      --glass-bg: rgba(18, 28, 48, 0.95);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary), #020408);
      color: var(--text-primary);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    /* Particles */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Hero */
    .hero {
      text-align: center;
      z-index: 10;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      text-shadow: 0 0 50px rgba(255, 77, 109, 0.6);
      animation: titleGlow 2.5s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 25px var(--accent-pink)); }
      to { filter: drop-shadow(0 0 50px var(--accent-gold)); }
    }

    /* HORIZONTAL FLOWERS */
    .flowers-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 3.5rem;
      width: 100%;
      max-width: 95vw;
      height: 320px;
      position: relative;
      z-index: 10;
      overflow: visible;
    }

    .flower {
      position: relative;
      cursor: pointer;
      opacity: 0;
      transform: translateY(60px) scale(0.7);
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .flower.bloomed {
      opacity: 1;
      transform: translateY(0) scale(1.1);
    }

    .flower:hover {
      transform: translateY(-25px) scale(1.2) !important;
      filter: drop-shadow(0 25px 50px rgba(255, 77, 109, 0.5));
    }

    .stem {
      width: 14px;
      height: 250px;
      background: linear-gradient(to top, #4ca56c, #6bcf7e, #8de69a);
      border-radius: 8px 8px 40px 40px;
      position: relative;
      box-shadow: 0 0 40px rgba(76, 165, 108, 0.7);
    }

    .flower-head {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent-pink), var(--accent-gold), var(--accent-purple), var(--accent-pink));
      box-shadow: 
        0 0 60px var(--accent-pink),
        inset 0 8px 20px rgba(255,255,255,0.4);
      opacity: 0;
      scale: 0;
    }

    .flower.bloomed .flower-head {
      opacity: 1;
      scale: 1;
      animation: bloomPulse 2s ease-in-out infinite;
    }

    @keyframes bloomPulse {
      0%, 100% { scale: 1; }
      50% { scale: 1.05; }
    }

    .leaves {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
    }

    .leaf {
      position: absolute;
      width: 30px;
      height: 14px;
      background: linear-gradient(135deg, #3a8c5c, #5dd37a);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 20px rgba(76, 165, 108, 0.6);
    }

    .leaf.left { left: -20px; transform: rotate(-35deg); }
    .leaf.right { right: -20px; transform: rotate(35deg); }

    /* LOVE MESSAGE - ALWAYS VISIBLE */
    .love-message {
      background: var(--glass-bg);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 30px;
      padding: 3rem 3.5rem;
      max-width: 550px;
      width: 95%;
      text-align: center;
      box-shadow: 
        0 40px 80px rgba(0,0,0,0.4),
        0 0 80px rgba(255, 77, 109, 0.4);
      z-index: 20;
      position: relative;
    }

    .love-message h2 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .love-message p {
      font-size: 1.4rem;
      line-height: 1.9;
      font-weight: 600;
      color: var(--text-primary);
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* MUSIC BUTTON - CHORUS TRIGGER */
    .music-btn {
      position: relative;
      background: linear-gradient(135deg, rgba(255,77,109,0.3), rgba(245,158,11,0.3));
      border: 3px solid transparent;
      color: white;
      font-size: 1.4rem;
      font-weight: 800;
      padding: 1.5rem 4rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 
        0 25px 60px rgba(255,77,109,0.5),
        0 0 80px rgba(255,77,109,0.4),
        inset 0 1px 0 rgba(255,255,255,0.3);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(30px);
      z-index: 25;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .music-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: left 0.8s;
    }

    .music-btn:hover {
      transform: translateY(-8px) scale(1.1);
      box-shadow: 
        0 35px 80px rgba(255,77,109,0.6),
        0 0 100px rgba(255,77,109,0.5);
      background: linear-gradient(135deg, rgba(255,77,109,0.5), rgba(245,158,11,0.5));
    }

    .music-btn:hover::before {
      left: 100%;
    }

    .music-btn:active {
      transform: scale(0.98);
    }

    /* MUSIC DISPLAY */
    .music-display {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      padding: 1.2rem 2rem;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.3);
      text-align: center;
      font-weight: 700;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      z-index: 30;
      min-width: 280px;
    }

    .music-title {
      font-size: 1.3rem;
      color: var(--accent-gold);
      margin-bottom: 0.3rem;
      animation: pulse 2s infinite;
    }

    .music-artist {
      font-size: 1rem;
      color: var(--accent-pink);
      opacity: 0.9;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Effects */
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 15;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      opacity: 0;
      animation: heartFloat 6s ease-out forwards;
      filter: drop-shadow(0 0 20px var(--accent-pink));
    }

    @keyframes heartFloat {
      0% { 
        opacity: 1; 
        transform: translateY(0) scale(0.3) rotate(0deg); 
      }
      100% { 
        opacity: 0; 
        transform: translateY(-120vh) scale(1.8) rotate(1080deg); 
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .flowers-row {
        gap: 2rem;
        height: 280px;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .stem { height: 180px; }
      .flower-head { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <!-- YouTube Player - HIDDEN -->
  <div style="position: absolute; top: -1000px; opacity: 0;">
    <iframe 
      id="ebeb-player" 
      width="0" 
      height="0" 
      src="https://www.youtube.com/embed/8Q-C6-A-FAY?enablejsapi=1&playsinline=1&start=45&end=90" 
      frameborder="0" 
      allow="autoplay; encrypted-media">
    </iframe>
  </div>

  <!-- MUSIC DISPLAY -->
  <div class="music-display" id="music-display">
    <div class="music-title">🎵 Ebeb</div>
    <div class="music-artist">Flow G - Choros Title</div>
  </div>

  <!-- Particles -->
  <canvas id="particles"></canvas>

  <!-- Content -->
  <div class="hero">
    <h1>Happy Monthsary My Love! 🌸💖</h1>
  </div>

  <div class="flowers-row" id="flowers-row"></div>

  <!-- LOVE MESSAGE -->
  <div class="love-message">
    <h2>Thank you for everything my love</h2>
    <p>I love you always!! 💕✨🌟💖</p>
  </div>

  <!-- CHORUS BUTTON -->
  <button class="music-btn" id="chorus-btn">
    🎤 Play Ebeb Chorus Now!
  </button>

  <!-- Effects -->
  <div class="hearts" id="hearts"></div>

  <script>
    class EbebMonthsary {
      constructor() {
        this.playerReady = false;
        this.isPlaying = false;
        this.init();
      }

      init() {
        this.createParticles();
        this.createFlowers();
        this.setupPlayer();
        this.bindEvents();
        this.startAmbientHearts();
      }

      createParticles() {
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 80; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: canvas.height + 100,
            vx: (Math.random() - 0.5) * 2,
            vy: -(Math.random() * 3 + 2),
            size: Math.random() * 3 + 1,
            hue: 300 + Math.random() * 60
          });
        }

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, 0.8)`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.02; // gravity

            if (p.y > canvas.height) {
              p.y = -20;
              p.x = Math.random() * canvas.width;
            }
          });
          requestAnimationFrame(animate);
        };
        animate();
      }

      createFlowers() {
        const container = document.getElementById('flowers-row');
        for (let i = 0; i < 13; i++) {
          const flower = document.createElement('div');
          flower.className = 'flower';
          flower.innerHTML = `
            <div class="stem"></div>
            <div class="flower-head"></div>
            <div class="leaves">
              <div class="leaf left"></div>
              <div class="leaf right"></div>
            </div>
          `;
          container.appendChild(flower);
        }
      }

      setupPlayer() {
        // Load YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = () => {
          this.player = new YT.Player('ebeb-player', {
            events: {
              onReady: (event) => {
                this.playerReady = true;
                console.log('🎵 Ebeb chorus ready!');
              },
              onStateChange: (event) => {
                if (event.data === YT.PlayerState.ENDED) {
                  this.player.seekTo(45, true); // Loop chorus
                  this.player.playVideo();
                }
              }
            }
          });
        };
      }

      bindEvents() {
        document.getElementById('chorus-btn').onclick = () => this.playChorus();
        
        document.querySelectorAll('.flower').forEach(flower => {
          flower.onmouseenter = () => {
            if (Math.random() > 0.7) {
              this.createHeart(flower.getBoundingClientRect().left + 35, 
                              flower.getBoundingClientRect().top);
            }
          };
        });
      }

      playChorus() {
        if (!this.playerReady) {
          alert('🎵 Loading Ebeb chorus... Please wait!');
          return;
        }

        this.isPlaying = !this.isPlaying;
        const btn = document.getElementById('chorus-btn');
        
        if (this.isPlaying) {
          // JUMP TO CHORUS (around 45 seconds in Ebeb)
          this.player.loadVideoById({
            videoId: '8Q-C6-A-FAY',
            startSeconds: 45,  // CHORUS START
            endSeconds: 90     // CHORUS END
          });
          
          // Bloom ALL flowers
          document.querySelectorAll('.flower').forEach((f, i) => {
            setTimeout(() => f.classList.add('bloomed'), i * 100);
          });

          // MASSIVE CELEBRATION
          for (let i = 0; i < 80; i++) {
            setTimeout(() => this.createHeart(Math.random() * window.innerWidth), i * 50);
          }

          btn.innerHTML = '🎵 Ebeb Playing... Stop?';
          btn.style.background = 'linear-gradient(135deg, rgba(76,175,80,0.5), rgba(255,193,7,0.5))';
          
        } else {
          this.player.stopVideo();
          btn.innerHTML = '🎤 Play Ebeb Chorus Now!';
          btn.style.background = 'linear-gradient(135deg, rgba(255,77,109,0.3), rgba(245,158,11,0.3))';
        }
      }

      createHeart(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['💖', '💕', '💗', '🌸', '✨', '⭐'][Math.floor(Math.random() * 6)];
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.getElementById('hearts').appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }

      startAmbientHearts() {
        setInterval(() => {
          this.createHeart(Math.random() * window.innerWidth, window.innerHeight * 0.7);
        }, 2500);
      }
    }

    // START MAGIC
    new EbebMonthsary();
  </script>
</body>
</html>
