<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monthsary with You - Ebeb by Flow G 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* ULTRA MODERN SYSTEM - HORIZONTAL FLOWERS */
    :root {
      --bg-primary: #0a0e1a;
      --accent-pink: #ff4d6d;
      --accent-gold: #f59e0b;
      --accent-purple: #a855f7;
      --text-primary: #f8fafc;
      --glass-bg: rgba(18, 28, 48, 0.9);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary), #020408);
      color: var(--text-primary);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    /* Particle Background */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* HERO TITLE */
    .hero {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    .hero h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      text-shadow: 0 0 40px rgba(255, 77, 109, 0.5);
      animation: glow 2s ease-in-out infinite alternate;
      margin-bottom: 0.5rem;
    }

    .hero .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      color: var(--accent-gold);
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 20px var(--accent-pink)); }
      to { filter: drop-shadow(0 0 40px var(--accent-gold)); }
    }

    /* HORIZONTAL FLOWERS - MAIN FEATURE */
    .flowers-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 3rem;
      width: 100%;
      max-width: 90vw;
      height: 300px;
      position: relative;
      z-index: 10;
      overflow: visible;
      padding: 2rem 0;
    }

    .flower {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      transform: translateY(50px) scale(0.8);
    }

    .flower.active {
      opacity: 1;
      transform: translateY(0) scale(1.1);
    }

    .flower:hover {
      transform: translateY(-20px) scale(1.15) !important;
      filter: drop-shadow(0 20px 40px rgba(255, 77, 109, 0.4));
    }

    .stem {
      width: 12px;
      height: 220px;
      background: linear-gradient(to top, #4ca56c, #6bcf7e);
      border-radius: 6px 6px 30px 30px;
      position: relative;
      transform-origin: bottom;
      box-shadow: 0 0 30px rgba(76, 165, 108, 0.6);
    }

    .flower.active .stem {
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .flower-head {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50% 50% 50% 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent-pink), #ff6b82);
      box-shadow: 
        0 0 40px var(--accent-pink),
        inset 0 5px 15px rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateX(-50%) scale(0) rotate(180deg);
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .flower.active .flower-head {
      opacity: 1;
      transform: translateX(-50%) scale(1) rotate(0deg);
    }

    .leaves {
      position: absolute;
      bottom: 20%;
    }

    .leaf {
      position: absolute;
      width: 25px;
      height: 12px;
      background: linear-gradient(135deg, #3a8c5c, #4ca56c);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 15px rgba(76, 165, 108, 0.5);
    }

    .leaf.left { 
      left: -10px; 
      transform: rotate(-30deg); 
    }

    .leaf.right { 
      right: -10px; 
      transform: rotate(30deg); 
    }

    /* ALWAYS VISIBLE MESSAGE - GLASSMORPHISM */
    .love-message {
      background: var(--glass-bg);
      backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      padding: 2.5rem 3rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 
        0 30px 60px rgba(0,0,0,0.3),
        0 0 60px rgba(255, 77, 109, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      z-index: 20;
      opacity: 1 !important;
      transform: translateY(0) scale(1) !important;
      animation: messagePulse 4s ease-in-out infinite;
    }

    .love-message h2 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .love-message p {
      font-size: 1.3rem;
      line-height: 1.8;
      color: var(--text-primary);
      font-weight: 500;
      opacity: 0.95;
    }

    @keyframes messagePulse {
      0%, 100% { 
        box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 60px rgba(255, 77, 109, 0.3);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 80px rgba(255, 77, 109, 0.5);
        transform: scale(1.02);
      }
    }

    /* UPGRADED BUTTON */
    .action-btn {
      position: relative;
      background: linear-gradient(135deg, rgba(255,77,109,0.25), rgba(245,158,11,0.25));
      border: 2px solid transparent;
      color: var(--accent-pink);
      font-size: 1.2rem;
      font-weight: 700;
      padding: 1.3rem 3rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 
        0 15px 35px rgba(255,77,109,0.4),
        0 0 50px rgba(255,77,109,0.3);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      z-index: 20;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.7s;
    }

    .action-btn:hover {
      transform: translateY(-5px) scale(1.1);
      box-shadow: 
        0 25px 50px rgba(255,77,109,0.5),
        0 0 70px rgba(255,77,109,0.4);
    }

    .action-btn:hover::before {
      left: 100%;
    }

    /* Effects */
    .hearts, .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 15;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0;
      animation: floatUp 5s ease-out forwards;
      filter: drop-shadow(0 0 15px var(--accent-pink));
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.5) rotate(720deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .flowers-row {
        gap: 1.5rem;
        height: 250px;
        flex-wrap: wrap;
      }
      
      .stem {
        height: 160px;
      }
      
      .flower-head {
        width: 50px;
        height: 50px;
      }
    }

    /* Music Player */
    .music-info {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      padding: 1rem 1.5rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.9rem;
      z-index: 25;
    }

    .music-info span {
      display: block;
      color: var(--accent-gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- YouTube Player -->
  <div style="position: absolute; top: -1000px;">
    <iframe id="music-player" width="0" height="0" 
      src="https://www.youtube.com/embed/8Q-C6-A-FAY?enablejsapi=1&playsinline=1&autoplay=1&loop=1&playlist=8Q-C6-A-FAY" 
      frameborder="0" allow="autoplay"></iframe>
  </div>

  <!-- Music Info -->
  <div class="music-info">
    <span>🎵 Ebeb - Flow G</span>
    <span>Choros Title Vibes</span>
  </div>

  <!-- Particles -->
  <canvas id="particles"></canvas>

  <!-- Main Content -->
  <div class="hero">
    <h1>Happy Monthsary Love! 🌸💖</h1>
    <div class="subtitle">Forever grateful for you</div>
  </div>

  <!-- HORIZONTAL FLOWERS ROW -->
  <div class="flowers-row" id="flowers-row">
    <!-- Flowers generated by JS -->
  </div>

  <!-- ALWAYS VISIBLE LOVE MESSAGE -->
  <div class="love-message">
    <h2>Thank you for everything my love</h2>
    <p>I love you always!! 💕✨🌟</p>
  </div>

  <button class="action-btn" id="bloom-btn">💖 Make Flowers Bloom 💖</button>

  <!-- Effects -->
  <div class="hearts" id="hearts"></div>
  <div class="confetti" id="confetti"></div>

  <script>
    class UltimateMonthsary {
      constructor() {
        this.isActive = false;
        this.init();
      }

      init() {
        this.createParticles();
        this.createHorizontalFlowers();
        this.bindEvents();
        this.playMusic();
        this.startHearts();
      }

      createParticles() {
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = Array(60).fill().map(() => ({
          x: Math.random() * canvas.width,
          y: canvas.height + 100,
          size: Math.random() * 4 + 1,
          speed: Math.random() * 2 + 1,
          color: `hsl(${300 + Math.random() * 60}, 70%, ${50 + Math.random() * 30}%)`
        }));

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            p.y -= p.speed;
            if (p.y < 0) p.y = canvas.height + 100;
          });
          requestAnimationFrame(animate);
        }
        animate();
      }

      createHorizontalFlowers() {
        const container = document.getElementById('flowers-row');
        for (let i = 0; i < 11; i++) {
          const flower = document.createElement('div');
          flower.className = 'flower';
          flower.style.animationDelay = `${i * 0.15}s`;
          flower.innerHTML = `
            <div class="stem"></div>
            <div class="flower-head"></div>
            <div class="leaves">
              <div class="leaf left"></div>
              <div class="leaf right"></div>
            </div>
          `;
          container.appendChild(flower);
        }
      }

      bindEvents() {
        document.getElementById('bloom-btn').onclick = () => this.bloomMagic();
        
        document.querySelectorAll('.flower').forEach((flower, i) => {
          flower.onmouseenter = () => {
            if (!this.isActive) return;
            flower.classList.add('active');
            this.spawnHearts(flower.offsetLeft + flower.offsetWidth/2, flower.offsetTop);
          };
        });
      }

      bloomMagic() {
        if (this.isActive) return;
        this.isActive = true;

        // Bloom all flowers
        document.querySelectorAll('.flower').forEach((f, i) => {
          setTimeout(() => f.classList.add('active'), i * 120);
        });

        // Massive heart explosion
        for (let i = 0; i < 50; i++) {
          setTimeout(() => this.spawnHearts(Math.random() * window.innerWidth), i * 80);
        }

        // Button transformation
        const btn = document.getElementById('bloom-btn');
        btn.textContent = '🌸 Love Fully Bloomed! 🌸';
        btn.style.background = 'linear-gradient(135deg, rgba(255,77,109,0.4), rgba(245,158,11,0.4))';
      }

      spawnHearts(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['💖', '💕', '💗', '🌸', '✨'][Math.floor(Math.random() * 5)];
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.animationDuration = (3 + Math.random() * 3) + 's';
        document.getElementById('hearts').appendChild(heart);
        
        setTimeout(() => heart.remove(), 6000);
      }

      startHearts() {
        setInterval(() => {
          this.spawnHearts(Math.random() * window.innerWidth, window.innerHeight);
        }, 3000);
      }

      playMusic() {
        // Music auto-starts (Ebeb by Flow G)
        const player = document.getElementById('music-player');
        player.onload = () => {
          player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        };
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => new UltimateMonthsary());
  </script>
</body>
</html>
